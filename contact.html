<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vijay Kumar | Contact</title>
  <meta name="description" content="Portfolio website of Vijay Kumar">
  <meta name="keywords" content="Portfolio, HTML5, CSS, Web Developer">
  <meta name="author" content="Vijay Kumar">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header role="banner">
    <div class="container">
      <h1>Contact</h1>
      <nav role="navigation" aria-label="Contact page navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Me</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <section aria-labelledby="contact-heading">
      <h2 id="contact-heading">Get in Touch</h2>
      <p>If you have a project or opportunity, please reach out using the form below.</p>

      <form aria-label="Contact Form" class="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
        </div>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p>© 2026 Vijay Kumar. Reach out for accessible web work.</p>
    </div>
  </footer>
</body>
</html>
